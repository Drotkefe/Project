<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SexMoneyShare — Split Expenses</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css?v=2">
</head>
<body>
  <header>
    <div class="header-inner">
      <h1 class="logo">SexMoneyShare</h1>
      <nav>
        <button class="nav-btn active" data-tab="dashboard">Dashboard</button>
        <button class="nav-btn" data-tab="members">Members</button>
        <button class="nav-btn" data-tab="trips">Expenses</button>
      </nav>
    </div>
  </header>

  <main>
    <!-- Dashboard Tab -->
    <section id="tab-dashboard" class="tab-content active">
      <div class="section-header">
        <h2>Balance Overview</h2>
      </div>
      <div id="balance-cards" class="card-grid"></div>

      <div class="section-header" style="margin-top:2rem">
        <h2>Settlements</h2>
        <p class="subtitle">Who owes whom</p>
      </div>
      <div id="settlements-list" class="settlements"></div>
    </section>

    <!-- Members Tab -->
    <section id="tab-members" class="tab-content">
      <div class="section-header">
        <h2>Members</h2>
        <button class="btn btn-primary" onclick="openMemberModal()">+ Add Member</button>
      </div>
      <div id="members-list" class="card-grid"></div>
    </section>

    <!-- Trips Tab -->
    <section id="tab-trips" class="tab-content">
      <div class="section-header">
        <h2>Expenses</h2>
        <button class="btn btn-primary" onclick="openTripModal()">+ New Expense</button>
      </div>
      <div id="trips-list"></div>
    </section>
  </main>

  <!-- Member Modal -->
  <div id="member-modal" class="modal">
    <div class="modal-backdrop" onclick="closeModal('member-modal')"></div>
    <div class="modal-content">
      <h3 id="member-modal-title">Add Member</h3>
      <form id="member-form" onsubmit="saveMember(event)">
        <input type="hidden" id="member-id">
        <div class="form-group">
          <label for="member-name">Name</label>
          <input type="text" id="member-name" required placeholder="Enter name">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" onclick="closeModal('member-modal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Trip Modal -->
  <div id="trip-modal" class="modal">
    <div class="modal-backdrop" onclick="closeModal('trip-modal')"></div>
    <div class="modal-content">
      <h3 id="trip-modal-title">New Expense</h3>
      <form id="trip-form" onsubmit="saveTrip(event)">
        <input type="hidden" id="trip-id">
        <div class="form-group">
          <label for="trip-name">Name</label>
          <input type="text" id="trip-name" required placeholder="e.g. Orgy Party in Arzenal with the gang">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="trip-cost">Total Cost (HUF)</label>
            <input type="number" id="trip-cost" required min="0" step="1" placeholder="0.00">
          </div>
          <div class="form-group">
            <label for="trip-date">Date</label>
            <input type="date" id="trip-date" required>
          </div>
        </div>
        <div class="form-group">
          <label>Participants</label>
          <div id="trip-members-checkboxes" class="checkbox-grid"></div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" onclick="closeModal('trip-modal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Payment Modal -->
  <div id="payment-modal" class="modal">
    <div class="modal-backdrop" onclick="closeModal('payment-modal')"></div>
    <div class="modal-content">
      <h3 id="payment-modal-title">Add Payment</h3>
      <form id="payment-form" onsubmit="savePayment(event)">
        <input type="hidden" id="payment-id">
        <input type="hidden" id="payment-trip-id">
        <div class="form-group" id="payment-member-group">
          <label for="payment-member">Member</label>
          <select id="payment-member" required></select>
        </div>
        <div class="form-group">
          <label for="payment-amount">Amount (HUF)</label>
          <input type="number" id="payment-amount" required min="0" step="0.01" placeholder="0.00">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" onclick="closeModal('payment-modal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script src="/static/app.js?v=2"></script>
</body>
</html>
